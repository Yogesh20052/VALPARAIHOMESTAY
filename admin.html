<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Page</title>

    <link rel="stylesheet" href="admin.css">
</head>

<body>

<div class="login-container">

    <div class="login-box">

        <h1>🔒 ADMIN PAGE</h1>

        <p>Valparai Homestay Admin Login</p>

        <form id="loginForm">

            <label>Username</label>
            <input
                type="text"
                id="username"
                placeholder="Enter Username"
                required
            >

            <label>Password</label>
            <input
                type="password"
                id="password"
                placeholder="Enter Password"
                required
            >

            <button type="submit">
                LOGIN
            </button>

            <p id="error"></p>

        </form>

    </div>

</div>

<script src="admin.js"></script>

</body>
</html>
