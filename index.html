<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Valparai Homestay</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header>

        <div class="logo">

            <!-- Replace this with your logo later -->
            <img src="logo.png" alt="Valparai Homestay Logo">

            <div class="logo-text">

                <h2>VALPARAI</h2>

                <span>HOMESTAY</span>

            </div>

        </div>

        <nav>

            <ul>

                <li><a href="INDEX.html">Home</a></li>

                <li><a href="about.html">About</a></li>

                <li><a href="rooms.html">Rooms</a></li>

                <li><a href="gallery.html">Gallery</a></li>

                <li><a href="contact.html">Contact</a></li>
                <li><a href="admin.html">🔒</a></li>

            </ul>

        </nav>

        <!-- Mobile Menu Button -->
        <button class="mobile-menu-btn" id="menuBtn" aria-label="Toggle Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

    </header>

    <!-- Overlay for mobile menu -->
    <div class="nav-overlay" id="navOverlay"></div>

    <!-- ================= HERO ================= -->

    <section class="hero">
        <!-- Sunrise Glow -->
        <div class="sun-glow"></div>

        <!-- Mist Layers -->
        <div class="mist mist1"></div>
        <div class="mist mist2"></div>

        <!-- Floating Leaves -->
        <div class="leaves">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>

        <img src="1779248917983.png" alt="Valparai Homestay">

        <div class="hero-content">

            <h1>WELCOME TO Valparai Homestay</h1>

            <p>
                Experience peaceful mornings, misty hills,
                beautiful tea estates and the warmth of home
                in the heart of Valparai.
            </p>

           <a href="book.html" class="explore-btn" style="display: inline-block; text-decoration: none; background: #2e8b57; color: white; padding: 15px 38px; border-radius: 50px; font-weight: 600; transition: .4s; z-index: 100; position: relative; cursor: pointer;">BOOK NOW</a>

        </div>

    </section>

    <script>
        // ===== MOBILE MENU TOGGLE (FIXED) =====
        const menuBtn = document.querySelector('.mobile-menu-btn');
        const nav = document.querySelector('nav');
        const overlay = document.getElementById('navOverlay');

        function toggleMenu() {
            nav.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        menuBtn.addEventListener('click', toggleMenu);

        // Close menu when clicking overlay
        overlay.addEventListener('click', toggleMenu);

        // Close menu when clicking a link
        document.querySelectorAll('nav ul li a').forEach(link => {
            link.addEventListener('click', () => {
                nav.classList.remove('active');
                overlay.classList.remove('active');
            });
        });
    </script>

</body>

</html>
